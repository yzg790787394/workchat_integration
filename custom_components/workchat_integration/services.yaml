# 1. 媒体上传服务
upload_media:
  name: 上传媒体文件
  description: "将本地文件上传到企业微信服务器暂存（有效期3天）。上传成功的 media_id 可用于后续发送图片、文件、语音或视频消息。"
  # 必须移除 response 块才能通过校验
  fields:
    type:
      name: 媒体类型
      description: 企微要求的资源分类。图片/语音/视频有格式限制，文件(file)最为通用。
      required: true
      default: file
      selector:
        select:
          options:
            - label: "图片 (image)"
              value: "image"
            - label: "语音 (voice)"
              value: "voice"
            - label: "视频 (video)"
              value: "video"
            - label: "普通文件 (file)"
              value: "file"
    file_path:
      name: 文件路径
      description: 文件的本地绝对路径。
      required: true
      example: "/config/www/cam_snapshot.jpg"
      selector:
        text:
    file_name:
      name: 自定义文件名
      description: 接收方看到的文件名称。
      required: false
      selector:
        text:

# 2. 发送企微通消息
notify:
  name: 发送企微通消息
  description: 通过自建应用推送各类富媒体消息。支持发送给特定用户或全体成员。
  fields:
    msg_type:
      name: 消息类型
      description: 决定消息的呈现方式。
      required: true
      default: text
      selector:
        select:
          options:
            - label: "纯文本 (text)"
              value: "text"
            - label: "Markdown (markdown)"
              value: "markdown"
            - label: "文本卡片 (textcard)"
              value: "textcard"
            - label: "模版卡片 (template_card)"
              value: "template_card"
            - label: "图文消息 (news)"
              value: "news"
            - label: "图片 (image)"
              value: "image"
            - label: "文件 (file)"
              value: "file"
            - label: "语音 (voice)"
              value: "voice"
            - label: "视频 (video)"
              value: "video"
    message:
      name: 消息正文
      description: 消息的主要文本内容。
      selector:
        text:
          multiline: true
    title:
      name: 标题
      description: 消息标题。
      selector:
        text:
    touser:
      name: 指定接收人
      description: 填入成员 ID，多个用“|”分隔。全员填“@all”。
      selector:
        text:
    media_id:
      name: 媒体文件 ID
      description: 图片、文件、语音或视频消息必填。
      selector:
        text:
    url:
      name: 跳转链接
      description: 点击卡片后跳转的 URL。
      selector:
        text:
          type: url
    btntxt:
      name: 按钮文字
      description: 文本卡片底部的详情链接按钮文字。
      default: 详情
      selector:
        text:
    picurl:
      name: 封面图 URL
      description: 图文消息 (news) 顶部显示的封面图片链接。
      selector:
        text:
          type: url
    safe:
      name: 是否保密消息
      description: 设为 1 时，消息在通知栏隐藏正文。
      default: 0
      selector:
        number:
          min: 0
          max: 1
          mode: box
    articles:
      name: 图文列表 (高级)
      description: 仅用于 news 类型。
      selector:
        object:
    template_card_data:
      name: 模版卡片数据 (JSON)
      description: 仅用于 template_card 类型。
      selector:
        object:
