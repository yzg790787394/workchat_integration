# 1. 媒体上传服务 (支持服务响应)
upload_media:
  name: 上传媒体文件
  description: 上传本地文件到企业微信服务器，并获取用于发送消息的 media_id。
  fields:
    type:
      name: 媒体类型
      description: 企微要求的媒体类型。
      required: true
      default: file
      selector:
        select:
          options:
            - label: "文件 (file)"
              value: "file"
            - label: "图片 (image)"
              value: "image"
            - label: "语音 (voice)"
              value: "voice"
            - label: "视频 (video)"
              value: "video"
    file_path:
      name: 文件路径
      description: HA 能够访问的本地文件绝对路径（需在 allowlist_external_dirs 中授权）。
      required: true
      example: "/config/www/snapshot.jpg"
      selector:
        text:
    file_name:
      name: 自定义文件名
      description: 发送给企微时的显示文件名。
      required: false
      selector:
        text:
  # 标记该服务会返回结果 (HA 2023.7+)
  response:
    optional: false

# 2. 发送通知服务
notify:
  name: 发送企微通消息
  description: 通过企业微信发送多种格式的消息（支持文本、卡片、图文等）。
  fields:
    msg_type:
      name: 消息类型
      required: true
      default: text
      selector:
        select:
          options:
            - label: "纯文本 (text)"
              value: "text"
            - label: "Markdown (markdown)"
              value: "markdown"
            - label: "文本卡片 (textcard)"
              value: "textcard"
            - label: "图文消息 (news)"
              value: "news"
            - label: "图片 (image)"
              value: "image"
            - label: "文件 (file)"
              value: "file"
            - label: "语音 (voice)"
              value: "voice"
            - label: "视频 (video)"
              value: "video"
    message:
      name: 消息内容
      description: 文本、Markdown 或卡片的主要正文。
      selector:
        text:
          multiline: true
    title:
      name: 标题
      description: 用于卡片或视频消息的标题。
      selector:
        text:
    media_id:
      name: 媒体ID
      description: 通过 upload_media 服务获取的 ID。
      selector:
        text:
    url:
      name: 跳转链接
      description: 点击消息后跳转的 URL。
      selector:
        text:
          type: url
    btntxt:
      name: 按钮文字
      default: 详情
      selector:
        text:
    picurl:
      name: 图片 URL
      description: 图文消息显示的封面图。
      selector:
        text:
          type: url
    touser:
      name: 接收人
      description: 指定接收用户 ID，多个用 | 分隔，默认为配置中的用户。
      selector:
        text:
    articles:
      name: 图文列表
      description: 用于 news 类型，定义多篇图文。
      selector:
        object:
