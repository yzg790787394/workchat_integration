name: Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # 安装集成所需的依赖以及测试工具
          pip install pytest pytest-asyncio pytest-homeassistant-custom-component pyjwt cryptography

      - name: Run unit tests
        run: |
          # 运行测试文件夹下的所有测试
          pytest -v -s ./tests/
