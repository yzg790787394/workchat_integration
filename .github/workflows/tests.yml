name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          # 安装全家桶依赖，确保覆盖你目前三个集成的所有需求
          pip install pytest pytest-asyncio pytest-homeassistant-custom-component pyjwt cryptography aiohttp

      - name: Setup Pytest Config
        run: |
          # 自动生成配置文件，消除 asyncio 警告
          echo "[pytest]" > pytest.ini
          echo "asyncio_mode = auto" >> pytest.ini
          echo "asyncio_default_fixture_loop_scope = function" >> pytest.ini
          echo "pythonpath = ." >> pytest.ini

      - name: Run unit tests
        env:
          PYTHONPATH: .
        run: |
          # 只有存在 tests 文件夹且里面有文件时才运行
          if [ -d "./tests" ] && [ "$(ls -A ./tests)" ]; then
            python3 -m pytest -v -s ./tests/
          else
            echo "⚠️ 未发现测试用例，跳过步骤。"
          fi
