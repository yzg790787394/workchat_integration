# 1. 媒体上传服务
upload_media:
  name: 上传媒体文件
  description: 上传本地文件到企业微信服务器。注意：HA 必须拥有该路径的访问权限。
  fields:
    type:
      name: 媒体类型
      required: true
      default: file
      selector:
        select:
          options:
            - { label: "文件 (file)", value: "file" }
            - { label: "图片 (image)", value: "image" }
            - { label: "语音 (voice)", value: "voice" }
            - { label: "视频 (video)", value: "video" }
    file_path:
      name: 文件路径
      description: HA 能够访问的绝对路径。
      required: true
      example: "/config/www/cam_snapshot.jpg"
      selector:
        text:
    file_name:
      name: 自定义文件名
      description: 企微接收端显示的文件名（带后缀）。
      selector:
        text:
  # 明确标识返回 media_id
  response:
    optional: false

# 2. 发送企微通消息
notify:
  name: 发送企微通消息
  description: 支持所有企微原生消息格式。
  fields:
    msg_type:
      name: 消息类型
      required: true
      default: text
      selector:
        select:
          options:
            - { label: "纯文本 (text)", value: "text" }
            - { label: "Markdown (markdown)", value: "markdown" }
            - { label: "文本卡片 (textcard)", value: "textcard" }
            - { label: "模版卡片 (template_card)", value: "template_card" }
            - { label: "图文消息 (news)", value: "news" }
            - { label: "图片 (image)", value: "image" }
            - { label: "文件 (file)", value: "file" }
            - { label: "语音 (voice)", value: "voice" }
            - { label: "视频 (video)", value: "video" }
    message:
      name: 消息正文
      description: 文本或卡片的内容。支持换行。
      selector:
        text:
          multiline: true
    title:
      name: 标题
      description: 用于卡片或视频的标题。
      selector:
        text:
    touser:
      name: 接收人
      description: 成员ID列表（|分隔）。默认为配置中的接收人，@all 代表全体。
      selector:
        text:
    
    # 高级参数
    media_id:
      name: 媒体ID
      description: 图片/文件/视频必填。
      selector:
        text:
    url:
      name: 点击跳转链接
      selector:
        text:
          type: url
    btntxt:
      name: 按钮文字
      default: 详情
      selector:
        text:
    picurl:
      name: 图片 URL
      description: news 类型显示的封面图。
      selector:
        text:
          type: url
    articles:
      name: 图文列表 (高级)
      description: 用于 news 类型的多篇文章对象。
      selector:
        object:
    template_card_data:
      name: 模版卡片 JSON 数据
      description: 用于 template_card 类型的完整配置对象。
      selector:
        object:
